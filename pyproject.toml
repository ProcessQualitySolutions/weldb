[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "wmdb"
version = "0.1.0"
description = "Weld Map Database — YAML-based 2D weld map specs for boiler (.weldb), pipeline (.weldp), and structural steel (.weldi)."
requires-python = ">=3.10"
license = "MIT"
authors = [
    { name = "Larry" },
]
dependencies = [
    "pyyaml>=6.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.0",
    "ruff>=0.4",
]

[tool.setuptools.packages.find]
where = ["src"]

[tool.ruff]
line-length = 100
